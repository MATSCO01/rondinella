<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rondinella</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="icon" href="logoweb.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            font-family: 'Montserrat', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f26522;
            color: #fff;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            gap: 16px;
        }
        .container img {
            max-width: min(85vw, 500px);
            max-height: 55vh;
            height: auto;
            width: auto;
            margin: 0 auto;
            display: block;
        }
        .container h1 {
            margin-top: 72px;
            font-size: 2.4rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #fff;
        }
        .social-section {
            margin-top: 56px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
        }
        .social-section .intanto-text {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
        }
        .social-row {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
        }
        .social-row svg {
            width: 28px;
            height: 28px;
            fill: #fff;
            transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
        }
        .social-row a:hover svg,
        .social-row a:active svg {
            transform: scale(1.18);
        }
        .social-row .ig-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #ffffff;
            color: #f26522;
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            padding: 10px 22px;
            border-radius: 30px;
            transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s;
            white-space: nowrap;
            border: 2px solid #ffffff;
        }
        .social-row .ig-badge:hover,
        .social-row .ig-badge:active {
            transform: scale(1.07);
            box-shadow: 0 0 20px rgba(255,255,255,0.6);
        }
        .social-row .fb-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #ffffff;
            color: #f26522;
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            padding: 10px 22px;
            border-radius: 30px;
            transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s;
            white-space: nowrap;
            border: 2px solid #ffffff;
        }
        .social-row .fb-badge:hover,
        .social-row .fb-badge:active {
            transform: scale(1.07);
            box-shadow: 0 0 20px rgba(255,255,255,0.6);
        }
        @media (max-width: 768px) {
            .container {
                padding: 24px;
                gap: 14px;
            }
            .container img {
                max-width: 70vw;
                max-height: 40vh;
            }
            .container h1 {
                margin-top: 40px;
                font-size: 1.7rem;
                letter-spacing: 3px;
            }
            .social-section {
                margin-top: 32px;
                gap: 18px;
            }
            .social-section .intanto-text {
                font-size: 1rem;
            }
            .social-row {
                gap: 14px;
                flex-wrap: wrap;
            }
            .social-row .ig-badge,
            .social-row .fb-badge {
                font-size: 1rem;
                padding: 10px 22px;
            }
        }
        @media (max-width: 480px) {
            .container {
                padding: 12px;
                gap: 8px;
            }
            .container img {
                max-width: 92vw;
                max-height: 38vh;
                min-height: 120px;
            }
            .container h1 {
                margin-top: 12px;
                font-size: clamp(1rem, 5vw, 1.5rem);
                letter-spacing: 2px;
            }
            .social-section {
                margin-top: 16px;
                gap: 10px;
            }
            .social-section .intanto-text {
                font-size: clamp(0.75rem, 3.5vw, 1rem);
                letter-spacing: 1px;
            }
            .social-row {
                flex-direction: column;
                gap: 8px;
                width: 100%;
                align-items: center;
            }
            .social-row .ig-badge,
            .social-row .fb-badge {
                font-size: clamp(0.85rem, 4vw, 1rem);
                padding: 10px 18px;
                width: 100%;
                max-width: 280px;
                margin: 0 auto;
            }
        }
        @media (max-height: 500px) and (orientation: landscape) {
            .container {
                padding: 16px;
                gap: 8px;
            }
            .container img {
                max-height: 28vh;
            }
            .container h1 {
                margin-top: 16px;
                font-size: 1.2rem;
            }
            .social-section {
                margin-top: 16px;
                gap: 10px;
            }
            .social-section .intanto-text {
                font-size: 0.8rem;
            }
            .social-row {
                flex-direction: row;
                gap: 10px;
            }
            .social-row .ig-badge,
            .social-row .fb-badge {
                font-size: 0.85rem;
                padding: 8px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="rondienella%20logo.svg" alt="Logo Rondinella">
        <h1>Sito in restyling</h1>
        <div class="social-section">
            <div class="intanto-text">scopri i nostri prodotti su</div>
            <div class="social-row">
            <a href="https://www.instagram.com/rondinella_shoes/?hl=it" class="ig-badge" target="_blank" rel="noopener noreferrer" aria-label="Instagram Rondinella Shoes">
                INSTAGRAM
            </a>
            <a href="https://www.facebook.com/RondinellaOfficial/?locale=it_IT" class="fb-badge" target="_blank" rel="noopener noreferrer" aria-label="Facebook Rondinella Official">
                FACEBOOK
            </a>
        </div>
    </div>
    </div>
</body>
</html>
